<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Titulo que aparece na aba do navegador -->
    <title>Aula 1 - HTML</title> 
</head>
<body>
    <!-- H1 tamanho maior de titulo -->
    <h1>Olá Mundo!</h1> 

    <!-- tamanhos de titulos -->
    <h1>Titulo 1</h1>
    <h2>Titulo 2</h2>
    <h3>Titulo 3</h3>
    <h4>Titulo 4</h4>
    <h5>Titulo 5</h5>
    <h6>Tutulo 6</h6>

    <!-- listas -->
    <h2>Lista não ordenada</h2> <!-- bolinha -->
    <ul> 
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>

    <h2>Lista ordenada</h2> <!-- itens -->
    <ol> 
        <li>Item 5</li>
        <li>Item 4</li>
        <li>Item 6</li>
    </ol>

</body>
</html>
