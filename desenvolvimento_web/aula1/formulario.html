<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h2>Formulario do Site</h2>
    <!-- tag para criar um formulário -->
    <form>
        <label for="nome"> Nome: </label> <!-- nome do campo -->
        <!-- FOR: conecta o rótulo ao campo -->
            <input type="text" id="nome" name="nome"> <!-- input do campo, fala o tipo do campo e o nome que ele vai ter -->
        <br><br>
        <label for="email"> E-Mail: </label>
            <input type="email" id="email" name="email">
        <br><br>
            <label for="mensagem"> Mensagem </label>
        <br>
            <!-- area de texto, aquela caixa maior de mensagem, essa cabe 20 colunas e 8 linhas -->
            <textarea id="msg" name="msg" cols="20" rows="8"></textarea>
        <br><br>

    <!-- botão de envio -->
    <button>Enviar</button>

    </form>
</body>
</html>
