<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas -- Mesclar colunas e linhas</title>
</head>
<body>
    <!-- cria a tabela -->
    <table border="1"> <!-- tabela com borda  -->
        <!-- cria uma linha ou cabeçalho -->
        <tr>
            <!-- cria a coluna da tabela -->
            <td colspan="2"> Linha 1 Colunas 1 e 2</td> <!-- mesclar colunas 1 e 2 -->
            <td rowspan="2"> Coluna 3, linhas 1 e 2</td> <!-- mescla linhas 1 e 2 -->
        </tr>
        <tr>
            <td> Linha 2 Célula 1</td>
            <td> Linha 2 Célula 2</td>
        </tr>
        <tr>
            <td> Linha 3 Célula 1</td>
            <td> Linha 3 Célula 2</td>
            <td> Linha 3 Célula 3</td>
        </tr>
     </table>
    
</body>
</html>
