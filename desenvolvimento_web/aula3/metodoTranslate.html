<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Método de Transformação - Translate</title>
<style>
    .div1{ 
        transform: translateX(80px); /* desloca a div para a direita - eixo X */
    }
    .div2 { 
        transform: translateY(80px); /* desloca a div para baixo - eixo Y */
    }
    .div3 {
        transform: translate(80px, 100px); /* desloca a div para a direita e para baixo - eixo X e Y */
    }
    div{
        background-color:dimgray;
        width: 150px;
        height: 100px;
    }
</style>
</head>
<body>
    <!-- div original sem transformação -->
    <div>Eu &#9829; CSS!</div> <!-- &#9829; = coração --> 
    <br>
    <br>
    <br>
    <br>
    <div class="div1">Eu &#9829; CSS!</div> 
    <br>
    <br>
    <br>
    <br>
    <div class="div2">Eu &#9829; CSS!</div>
    <br>
    <br>
    <br>
    <br>
    <br>
    <div class="div3">Eu &#9829; CSS!</div>
</body>
</html>
