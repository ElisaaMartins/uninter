<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transições</title>
    <style> 
        /* transições */
        div {
            width: 100px;
            height: 100px;
            background: rgb(60, 0, 255);
            transition: width 2s; /* definindo a transição de largura para 2 segundos */
        }
        
        /* o que vai acontecer quando o mouse estiver sobre o quadrado */
        div:hover {
            width: 300px;
        }

        </style>
</head>
<body>
    <p>Coloque o curso sobre o quadrado abaixo para visualizar a transição.</p>
    <div></div>    
</body>
</html>
