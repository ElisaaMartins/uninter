<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barras de Navegação - Horizontal</title>

    <style>
        /* Estilo para a barra de navegação */
        /* Remove os marcadores de lista e define o estilo da barra de navegação */
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            background-color: #f1f1f1;
        }

        /* itens */
        li {
            float:left;
        }

        /* links */
        li a {
            display: block;
            color: #000;
            padding: 8px 16px;
            text-decoration: none;
        }

        /* Adiciona um efeito de hover aos links da barra de navegação */
        li a:hover {
            background-color: #555;
            color: white;
        }
    </style>
</head>
<body>

    <h2> Navegação Horizontal</h2>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#news">Notícias</a></li>
        <li><a href="#contato">Contato</a></li>
    </ul>

</body>
</html>
